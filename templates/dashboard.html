<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaSound - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
            margin-top: 30px;
        }

        .sidebar {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
        }

        .main-content {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: white;
        }

        th,
        td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #a1a1aa;
            font-weight: 500;
        }

        .token-display {
            font-size: 2em;
            font-weight: bold;
            color: #4ade80;
        }
    </style>
</head>

<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
    </div>

    <div class="container glass-panel" style="max-width: 1000px;">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="margin: 0;">SaaSound Portal</h1>
                <p class="subtitle" style="margin: 0;">لوحة تحكم المستخدم</p>
            </div>
            <div>
                <a href="/" class="secondary-btn">العودة للاستوديو</a>
                <button id="logout-btn" class="secondary-btn" style="background: rgba(239,68,68,0.2);">تسجيل
                    الخروج</button>
            </div>
        </header>

        <main class="dashboard-container">
            <div class="sidebar">
                <h3>حسابي</h3>
                <p id="user-email" style="color: #a1a1aa;">...</p>

                <h4 style="margin-top: 30px;">الرصيد المتبقي (أحرف)</h4>
                <div class="token-display" id="token-balance">...</div>
            </div>

            <div class="main-content">
                <h3>سجل التوليد (المقاطع السابقة)</h3>
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>التاريخ</th>
                            <th>رقم الطلب (Session)</th>
                            <th>الصوت</th>
                            <th>التكلفة</th>
                            <th>الاستماع</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" style="text-align:center;">جاري التحميل...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("auth_token");
            if (!token) {
                window.location.href = "/";
                return;
            }

            const headers = { "Authorization": `Bearer ${token}` };

            // Fetch User Profile
            try {
                const userRes = await fetch("/api/v1/auth/me", { headers });
                if (!userRes.ok) throw new Error("Unauthorized");
                const userData = await userRes.json();

                document.getElementById("user-email").textContent = userData.email;
                document.getElementById("token-balance").textContent = userData.token_balance.toLocaleString();
            } catch (e) {
                localStorage.removeItem("auth_token");
                window.location.href = "/";
            }

            // Fetch History
            try {
                const histRes = await fetch("/api/v1/history", { headers });
                const histData = await histRes.json();

                const tbody = document.querySelector("#history-table tbody");
                tbody.innerHTML = "";

                if (histData.history && histData.history.length > 0) {
                    histData.history.forEach(item => {
                        const tr = document.createElement("tr");
                        const date = new Date(item.created_at).toLocaleString();

                        tr.innerHTML = `
                            <td>${date}</td>
                            <td style="font-size: 0.8em; color: #a1a1aa;">${item.session_id.substring(0, 8)}...</td>
                            <td>${item.voice_id}</td>
                            <td style="color: #f87171;">-${item.characters_used}</td>
                            <td>
                                <a href="/api/v1/session/${item.session_id}/normal.mp3" class="secondary-btn" target="_blank" style="padding: 5px 10px; font-size: 0.8em;">عادي</a>
                                <a href="/api/v1/session/${item.session_id}/cinematic.mp3" class="secondary-btn" target="_blank" style="padding: 5px 10px; font-size: 0.8em;">سينمائي</a>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>لا يوجد سجل حتى الآن.</td></tr>";
                }
            } catch (e) {
                console.error("Failed to fetch history");
            }

            // Logout
            document.getElementById("logout-btn").addEventListener("click", () => {
                localStorage.removeItem("auth_token");
                window.location.href = "/";
            });
        });
    </script>
</body>

</html>
